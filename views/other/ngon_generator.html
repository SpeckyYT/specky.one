<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>N-Gon Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a12;
    --panel: #0f0f1e;
    --border: #1e1e3a;
    --accent: #7c6aff;
    --accent2: #2dd4bf;
    --text: #c8c4e8;
    --muted: #4a4870;
    --error: #ff6b8a;
    --warn: #ffb347;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: grid;
    grid-template-columns: 340px 1fr;
    grid-template-rows: auto 1fr;
  }

  header {
    grid-column: 1 / -1;
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: -0.02em;
    color: #fff;
  }

  header span {
    font-size: 0.75rem;
    color: var(--muted);
    margin-left: auto;
  }

  .hex-badge {
    width: 32px;
    height: 32px;
  }

  .controls {
    padding: 28px 24px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  label span {
    color: var(--accent2);
    float: right;
    font-size: 0.65rem;
    text-transform: none;
    letter-spacing: 0;
  }

  input[type=number] {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    padding: 10px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type=number]:focus {
    border-color: var(--accent);
  }

  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .range-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .range-val {
    font-size: 0.8rem;
    color: var(--accent2);
    min-width: 40px;
    text-align: right;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
  }

  .section-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: -8px;
  }

  .color-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .color-row input[type=color] {
    width: 40px;
    height: 36px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: none;
    cursor: pointer;
    padding: 2px;
  }

  .color-row input[type=number] {
    flex: 1;
  }

  .msg {
    font-size: 0.72rem;
    padding: 8px 12px;
    border-radius: 6px;
    display: none;
  }

  .msg.warn { background: #2a1f0a; border: 1px solid var(--warn); color: var(--warn); display: block; }
  .msg.error { background: #1f0a12; border: 1px solid var(--error); color: var(--error); display: block; }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  button {
    flex: 1;
    padding: 11px;
    border-radius: 8px;
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .btn-generate {
    background: var(--accent);
    color: #fff;
  }

  .btn-generate:hover { background: #9480ff; }

  .btn-download {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-download:hover { border-color: var(--accent2); color: var(--accent2); }

  .preview {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }

  .preview-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.4;
  }

  #svg-output {
    position: relative;
    z-index: 1;
    max-width: 100%;
    max-height: 70vh;
    filter: drop-shadow(0 0 30px rgba(124, 106, 255, 0.2));
  }

  .info-bar {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.65rem;
    color: var(--muted);
    white-space: nowrap;
    z-index: 2;
  }

  .info-bar span { color: var(--accent2); }

  /* hide number spinners */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>

<header>
  <svg class="hex-badge" viewBox="0 0 32 32" fill="none">
    <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="#7c6aff" opacity="0.2" stroke="#7c6aff" stroke-width="1.5"/>
    <polygon points="16,7 23,11 23,21 16,25 9,21 9,11" fill="#2dd4bf" opacity="0.15" stroke="#2dd4bf" stroke-width="1"/>
  </svg>
  <h1>N-Gon Generator</h1>
  <span>by BlackEye — derived from scratch</span>
</header>

<div class="controls">

  <p class="section-title">Geometry</p>

  <div class="field">
    <label>Circumradius (R) <span id="r-val"></span></label>
    <input type="number" id="R" value="100" min="1" step="1"/>
  </div>

  <div class="field">
    <label>Vertices (v) <span>min 3</span></label>
    <input type="number" id="v" value="6" min="3" step="1"/>
  </div>

  <div class="field">
    <label>Corner Radius (r_z) <span id="rz-max"></span></label>
    <div class="range-row">
      <input type="range" id="r_z_range" min="0" max="100" value="15" step="0.5"/>
      <span class="range-val" id="rz-val">15</span>
    </div>
    <input type="number" id="r_z" value="15" min="0" step="0.5"/>
  </div>

  <div class="field">
    <label>Base Rotation (deg)</label>
    <div class="range-row">
      <input type="range" id="rot_range" min="0" max="360" value="0" step="1"/>
      <span class="range-val" id="rot-val">0°</span>
    </div>
    <input type="number" id="rot" value="0" min="0" max="360" step="1"/>
  </div>

  <hr class="divider"/>
  <p class="section-title">Appearance</p>

  <div class="field">
    <label>Fill Color</label>
    <div class="color-row">
      <input type="color" id="fill-color" value="#7c6aff"/>
      <input type="number" id="fill-opacity" value="100" min="0" max="100" step="1"/>
      <label style="font-size:0.65rem;color:var(--muted);margin:0">%</label>
    </div>
  </div>

  <div class="field">
    <label>Stroke Color</label>
    <div class="color-row">
      <input type="color" id="stroke-color" value="#2dd4bf"/>
      <input type="number" id="stroke-width" value="2" min="0" step="0.5"/>
      <label style="font-size:0.65rem;color:var(--muted);margin:0">px</label>
    </div>
  </div>

  <div id="msg" class="msg"></div>

  <div class="btn-row">
    <button class="btn-generate" onclick="generate()">Generate</button>
    <button class="btn-download" onclick="download()">Download</button>
  </div>

</div>

<div class="preview">
  <div class="preview-bg"></div>
  <div id="svg-output"></div>
  <div class="info-bar" id="info-bar">ready</div>
</div>

<script>
  const PI = Math.PI;

  function theta(v) { return 2 * PI / v; }
  function r(R, v) { return R * Math.cos(theta(v) / 2); }
  function r_z_max(R, v) { return r(R, v); }

  function getC(R, v, r_z) {
    const z = r_z / Math.cos(theta(v) / 2);
    const pts = [];
    for (let i = 0; i < v; i++) {
      pts.push({
        x: (R - z) * Math.cos(i * theta(v)),
        y: (R - z) * Math.sin(i * theta(v))
      });
    }
    return pts;
  }

  function getD(R, v, r_z) {
    const C = getC(R, v, r_z);
    const pts = [];
    for (let i = 0; i < v; i++) {
      pts.push({
        arcStartX: C[i].x + r_z * Math.cos(theta(v) * (-0.5 + i)),
        arcStartY: C[i].y + r_z * Math.sin(theta(v) * (-0.5 + i)),
        arcEndX:   C[i].x + r_z * Math.cos(theta(v) * ( 0.5 + i)),
        arcEndY:   C[i].y + r_z * Math.sin(theta(v) * ( 0.5 + i)),
      });
    }
    return pts;
  }

  function buildPath(R, v, r_z, rotDeg) {
    const rotRad = rotDeg * PI / 180;
    const D = getD(R, v, r_z);

    function rot(x, y) {
      return {
        x: x * Math.cos(rotRad) - y * Math.sin(rotRad),
        y: x * Math.sin(rotRad) + y * Math.cos(rotRad)
      };
    }

    const s = rot(D[0].arcStartX, D[0].arcStartY);
    let d = `M ${s.x.toFixed(4)} ${s.y.toFixed(4)}\n`;

    for (let i = 1; i < v; i++) {
      const ae = rot(D[i-1].arcEndX, D[i-1].arcEndY);
      const ns = rot(D[i].arcStartX, D[i].arcStartY);
      d += `A ${r_z} ${r_z} 0 0 1 ${ae.x.toFixed(4)} ${ae.y.toFixed(4)}\n`;
      d += `L ${ns.x.toFixed(4)} ${ns.y.toFixed(4)}\n`;
    }

    const last = rot(D[v-1].arcEndX, D[v-1].arcEndY);
    d += `A ${r_z} ${r_z} 0 0 1 ${last.x.toFixed(4)} ${last.y.toFixed(4)}\n`;
    d += `L ${s.x.toFixed(4)} ${s.y.toFixed(4)}\nZ`;
    return d;
  }

  function hexToRgba(hex, opacity) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${opacity/100})`;
  }

  let lastSVG = '';

  function generate() {
    const R    = parseFloat(document.getElementById('R').value);
    const v    = parseInt(document.getElementById('v').value);
    let   r_z  = parseFloat(document.getElementById('r_z').value);
    const rot  = parseFloat(document.getElementById('rot').value) || 0;
    const fillColor   = document.getElementById('fill-color').value;
    const fillOpacity = parseFloat(document.getElementById('fill-opacity').value);
    const strokeColor = document.getElementById('stroke-color').value;
    const strokeWidth = parseFloat(document.getElementById('stroke-width').value);

    const msg = document.getElementById('msg');
    msg.className = 'msg';
    msg.textContent = '';

    if (isNaN(R) || R <= 0)  { msg.className = 'msg error'; msg.textContent = 'R must be a positive number.'; return; }
    if (isNaN(v) || v < 3)   { msg.className = 'msg error'; msg.textContent = 'Vertices must be at least 3.'; return; }
    if (isNaN(r_z) || r_z < 0) { msg.className = 'msg error'; msg.textContent = 'Corner radius must be >= 0.'; return; }

    const max = r_z_max(R, v);
    if (r_z > max) {
      r_z = max;
      document.getElementById('r_z').value = max.toFixed(2);
      document.getElementById('r_z_range').value = max;
      document.getElementById('rz-val').textContent = max.toFixed(2);
      msg.className = 'msg warn';
      msg.textContent = `r_z clamped to max (${max.toFixed(2)})`;
    }

    const tol = R * 0.05 + strokeWidth + 2;
    const vb = -(R + tol);
    const vbSize = 2 * (R + tol);

    const pathData = buildPath(R, v, r_z, rot);
    const fill = hexToRgba(fillColor, fillOpacity);
    const stroke = strokeWidth > 0 ? strokeColor : 'none';

    lastSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="${vbSize}" height="${vbSize}" viewBox="${vb} ${vb} ${vbSize} ${vbSize}">
  <path d="${pathData}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}"/>
</svg>`;

    document.getElementById('svg-output').innerHTML = lastSVG;

    document.getElementById('info-bar').innerHTML =
      `v=<span>${v}</span> &nbsp; R=<span>${R}</span> &nbsp; r_z=<span>${r_z.toFixed(2)}</span> &nbsp; rot=<span>${rot}°</span> &nbsp; max_r_z=<span>${max.toFixed(2)}</span>`;

    document.getElementById('rz-max').textContent = `max ${max.toFixed(1)}`;
  }

  function download() {
    if (!lastSVG) { generate(); }
    const blob = new Blob([lastSVG], {type: 'image/svg+xml'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ngon.svg';
    a.click();
  }

  // sync range <-> number for r_z
  document.getElementById('r_z_range').addEventListener('input', e => {
    document.getElementById('r_z').value = e.target.value;
    document.getElementById('rz-val').textContent = e.target.value;
    generate();
  });
  document.getElementById('r_z').addEventListener('input', e => {
    document.getElementById('r_z_range').value = e.target.value;
    document.getElementById('rz-val').textContent = parseFloat(e.target.value).toFixed(2);
    generate();
  });

  // sync rotation range <-> number
  document.getElementById('rot_range').addEventListener('input', e => {
    document.getElementById('rot').value = e.target.value;
    document.getElementById('rot-val').textContent = e.target.value + '°';
    generate();
  });
  document.getElementById('rot').addEventListener('input', e => {
    document.getElementById('rot_range').value = e.target.value;
    document.getElementById('rot-val').textContent = parseFloat(e.target.value) + '°';
    generate();
  });

  // live update on any input change
  ['R','v','fill-color','fill-opacity','stroke-color','stroke-width'].forEach(id => {
    document.getElementById(id).addEventListener('input', generate);
  });

  // update r_z range max when R or v changes
  function updateRzMax() {
    const R = parseFloat(document.getElementById('R').value);
    const v = parseInt(document.getElementById('v').value);
    if (R > 0 && v >= 3) {
      const max = r_z_max(R, v);
      document.getElementById('r_z_range').max = max;
      document.getElementById('rz-max').textContent = `max ${max.toFixed(1)}`;
    }
  }
  document.getElementById('R').addEventListener('input', updateRzMax);
  document.getElementById('v').addEventListener('input', updateRzMax);

  // initial render
  generate();
</script>
</body>
</html>
